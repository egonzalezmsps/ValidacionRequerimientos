spring:
  application:
    name: sla

  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false

  h2:
    console:
      enabled: true
      path: /h2-console

  security:
    user:
      name: admin
      password: enoc

app:
  ignore-session: true

  allowed-origins:
    - http://localhost:3000
    - http://localhost:4200

  allowed-methods:
    - GET
    - POST
    - PUT
    - PATCH
    - DELETE
    - OPTIONS
    - HEAD

  allowed-headers:
    - Authorization
    - Content-Type
    - Accept
    - Origin
    - X-Requested-With
    - X-Forwarded-For
    - X-Real-IP

  exposed-headers:
    - Authorization
    - X-Get-Header

server:
  servlet:
    context-path: /api/v1
  port: 8080

logging:
  level:
    org.springframework.security: WARN

mulesoft:
  enabled: true
  base-url: https://anypoint.mulesoft.com
  client-id: ${MULESOFT_CLIENT_ID:b6d61cc022164e2482cb17af74e34ca6}
  client-secret: ${MULESOFT_CLIENT_SECRET:8F1092016D394567951B7B712Ab3aed1}
  organization-id: ${MULESOFT_ORG_ID:}
  environment-id: ${MULESOFT_ENV_ID:}