spring:
  application:
    name: sla

  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

app:
  ignore-session: true

  allowed-origins:
    - http://localhost:3000
    - http://localhost:4200

  allowed-methods:
    - GET
    - POST
    - PUT
    - PATCH
    - DELETE
    - OPTIONS
    - HEAD

  allowed-headers:
    - Authorization
    - Content-Type
    - Accept
    - Origin
    - X-Requested-With
    - X-Forwarded-For
    - X-Real-IP

  exposed-headers:
    - Authorization
    - X-Get-Header

server:
  servlet:
    context-path: /api/v1
  port: 8080